# 数据源配置文件

data_sources:
  akshare:
    name: "AkShare"
    description: "AkShare 金融数据接口"
    base_url: "https://akshare.readthedocs.io/"
    enabled: true
    rate_limit: 10  # 每秒请求限制
    retry_times: 3
    timeout: 30
    
  openbb:
    name: "OpenBB"
    description: "OpenBB 开源金融数据平台"
    base_url: "https://openbb.co/"
    enabled: true
    rate_limit: 5
    retry_times: 3
    timeout: 30

# 数据库配置
database:
  type: "sqlite"
  path: "data/macro_economy.db"
  backup_enabled: true
  backup_frequency: "weekly"
  
# 更新配置
update_schedule:
  enabled: true
  daily_time: "08:00"  # 每日更新时间
  weekly_day: "monday"  # 每周更新日
  monthly_day: 1  # 每月更新日
